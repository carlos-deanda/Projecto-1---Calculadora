<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <div class="main-container">
        <div class="main-screen" id="screen">
            <div id="op-text"></div>
            <div id="res-text">0</div>
        </div>
        
        <div class="btn-container">
            <button class="btn4" onclick="erase()">AC</button>
            <button class="btn1" onclick="handleClick('^')">X^Y</button>
             <button class="btn1" onclick="toggleHistory()">🕒</button>
            <button class="btn1" onclick="handleClick('/')">/</button>
        </div>

        <div class="btn-container">
            <button class="btn2" onclick="handleClick(7)">7</button>
            <button class="btn2" onclick="handleClick(8)">8</button>
            <button class="btn2" onclick="handleClick(9)">9</button>
            <button class="btn1" onclick="handleClick('x')">x</button>
        </div>

        <div class="btn-container">
            <button class="btn2" onclick="handleClick(4)">4</button>
            <button class="btn2" onclick="handleClick(5)">5</button>
            <button class="btn2" onclick="handleClick(6)">6</button>
            <button class="btn1" onclick="handleClick('-')">-</button>
        </div>

        <div class="btn-container">
            <button class="btn2" onclick="handleClick(1)">1</button>
            <button class="btn2" onclick="handleClick(2)">2</button>
            <button class="btn2" onclick="handleClick(3)">3</button>
            <button class="btn1" onclick="handleClick('+')">+</button>
        </div>

        <div class="btn-container">
            <button class="btn2" onclick="handleClick(0)">0</button>
            <button class="btn2" onclick="handleClick('.')">.</button>
            <button class="btn3" onclick="calculate()">=</button>
        </div>

        <div id="history-screen" class="history-container" style="display: none;">
            <div class="history-header">
                <button onclick="toggleHistory()" class="back-btn">← Back to Calculator</button>
                <h1>History</h1>
            </div>
            <div id="history-list"></div>
            <div class="history-footer">END OF RECENT HISTORY</div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
